<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="55%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    
    <!-- Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1e40af" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Rounded Background Card -->
  <rect width="480" height="480" x="16" y="16" rx="96" fill="url(#bg-grad)" filter="url(#shadow)" />

  <!-- Plane Path Styled in White -->
  <g transform="translate(116, 116) scale(11.66)">
    <path 
      d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.9-.2-1.9.1-2.4.9l-1.1 1.9 8.2 3.6-3.2 3.2-3-.4-1.2 1.2 4 1.8 1.8 4 1.2-1.2-.4-3 3.2-3.2 3.6 8.2 1.9-1.1c.8-.5 1.1-1.5.9-2.4Z" 
      fill="none" 
      stroke="#ffffff" 
      stroke-width="1.8" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
  </g>
</svg>